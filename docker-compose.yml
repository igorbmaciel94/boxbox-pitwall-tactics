services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express:1
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo

  api:
    build:
      context: services/api
      dockerfile: BoxBox.Api/Dockerfile
    ports:
      - "5001:8080"
    environment:
      MONGODB_URI: mongodb://mongo:27017
      JWT_SECRET: ${JWT_SECRET:-boxbox-dev-secret-change-me-in-prod-32b}
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - mongo

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/content/node_modules
      - /app/packages/engine/node_modules
    command: npx --workspace=@apex/web vite --host 0.0.0.0

volumes:
  mongo-data:
