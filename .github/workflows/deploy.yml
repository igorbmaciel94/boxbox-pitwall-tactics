name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        required: false
        type: boolean
        default: false

jobs:
  test:
    name: Run Tests
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run backend tests
        run: dotnet test BoxBox.sln --configuration Release
        working-directory: services/api

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          JWT_SECRET_PROD: ${{ secrets.JWT_SECRET_PROD }}
        run: |
          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'ENDSSH'
            set -e

            cd /opt/boxbox

            # Write production .env
            cat > .env << ENVEOF
          JWT_SECRET=$JWT_SECRET_PROD
          CORS_ORIGIN=https://boxbox.lighthousedev.uk
          ASPNETCORE_ENVIRONMENT=Production
          BOXBOX_IMAGE_TAG=main
          ENVEOF

            # Pull latest images and restart
            docker compose pull
            docker compose up -d

            # Wait and verify health
            echo "Waiting for API to start..."
            sleep 10
            if curl -fsS http://localhost:18083/health > /dev/null; then
              echo "Health check passed"
            else
              echo "WARNING: Health check failed"
              docker compose logs --tail=50 api
              exit 1
            fi
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
