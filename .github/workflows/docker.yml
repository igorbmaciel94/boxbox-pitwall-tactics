name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          file: services/api/BoxBox.Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/boxbox-api:main
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/boxbox-api:${{ github.sha }}

  build-web:
    name: Build Web Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/boxbox-web:main
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/boxbox-web:${{ github.sha }}
