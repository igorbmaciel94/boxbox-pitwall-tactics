name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/api/**'

jobs:
  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore BoxBox.sln

      - name: Build
        run: dotnet build BoxBox.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test BoxBox.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: services/api/**/TestResults/*.trx
